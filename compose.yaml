services:
  renderer:
    build:
      context: .
      dockerfile: renderer/Dockerfile
    restart: unless-stopped
    ports:
      - "${RENDERER_PORT:-3100}:3100"
    environment:
      RENDERER_PORT: 3100
      RENDER_OUTPUT_DIR: /data/renders
      RENDER_PUBLIC_BASE_URL: ${RENDER_PUBLIC_BASE_URL:-http://localhost:3100/files}
      RENDER_TIMEOUT_MS: ${RENDER_TIMEOUT_MS:-120000}
      HTTP_REQUEST_TIMEOUT_MS: ${HTTP_REQUEST_TIMEOUT_MS:-130000}
      RENDER_PRESET: ${RENDER_PRESET:-medium}
      RENDER_CRF: ${RENDER_CRF:-20}
    volumes:
      - renderer-output:/data/renders

  web:
    build: .
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      TIKTOK_ENV: ${TIKTOK_ENV:-sandbox}
      PROD_TIKTOK_CLIENT_KEY: ${PROD_TIKTOK_CLIENT_KEY:?set PROD_TIKTOK_CLIENT_KEY in .env}
      PROD_TIKTOK_CLIENT_SECRET: ${PROD_TIKTOK_CLIENT_SECRET:?set PROD_TIKTOK_CLIENT_SECRET in .env}
      SANDBOX_TIKTOK_CLIENT_KEY: ${SANDBOX_TIKTOK_CLIENT_KEY:?set SANDBOX_TIKTOK_CLIENT_KEY in .env}
      SANDBOX_TIKTOK_CLIENT_SECRET: ${SANDBOX_TIKTOK_CLIENT_SECRET:?set SANDBOX_TIKTOK_CLIENT_SECRET in .env}
      TIKTOK_REDIRECT_URI: ${TIKTOK_REDIRECT_URI:?set TIKTOK_REDIRECT_URI in .env}
      TIKTOK_ALLOW_PUBLIC_POSTS: ${TIKTOK_ALLOW_PUBLIC_POSTS:-false}
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET in .env}
      N8N_SERVICE_TOKEN: ${N8N_SERVICE_TOKEN:?set N8N_SERVICE_TOKEN in .env}
      N8N_MEDIA_ALLOWED_HOSTS: ${N8N_MEDIA_ALLOWED_HOSTS:?set N8N_MEDIA_ALLOWED_HOSTS in .env}
      TIKTOK_SESSION_FILE: ${TIKTOK_SESSION_FILE:-/app/data/tiktok-session.enc}
    volumes:
      - tiktok-session:/app/data

volumes:
  tiktok-session:
  renderer-output:
